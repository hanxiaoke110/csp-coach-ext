<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>16204-拓展练习-森林查询</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">16204-拓展练习-森林查询</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>16204-拓展练习-森林查询</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：认识森林地图</h2><p>我们有一片 <span style='color:#2196F3; font-weight:bold;'>n×n</span> 的森林，每个格子里可能有 <span style='color:#4CAF50; font-weight:bold;'>🌲树</span> 或 <span style='color:#FFC107;'>空地</span>。</p><div style='display:flex; gap:4px; margin:10px 0;'><span style='background:#4CAF50; width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:30px; height:30px; display:flex; align-items:center; justify-content:center;'>⬜</span><span style='background:#4CAF50; width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:30px; height:30px; display:flex; align-items:center; justify-content:center;'>⬜</span></div><p>现在我们要回答很多次问题：<span style='color:#E91E63; font-weight:bold;'>从左上角(x1,y1)到右下角(x2,y2)的矩形里，一共有多少棵树？</span></p>","narration":"第一步，我们先认识森林地图。森林是一个正方形的格子图，每个格子里可能有树，也可能是空地。现在我们要回答很多个问题，每个问题都会问一个长方形区域里有多少棵树。"},{"html":"<h2>第二步：聪明的统计方法</h2><p>如果每次都一个个数树，太慢了！我们要用 <span style='color:#9C27B0; font-weight:bold;'>魔法前缀和</span> 来帮忙。</p><div style='display:flex; gap:8px; margin:10px 0;'><span style='background:#9C27B0; color:white; padding:5px 10px; border-radius:5px;'>pre[i][j]</span><span style='font-size:20px;'>→</span><span style='background:#FF9800; color:white; padding:5px 10px; border-radius:5px;'>从(1,1)到(i,j)的树总数</span></div><p>就像给每个格子记一个<span style='color:#F44336;'>累计账本</span>，记录从左上角到当前位置一共有多少棵树。</p>","narration":"第二步，我们用一个聪明的办法——前缀和。每个格子都记一个数字，这个数字表示从地图左上角到这个格子一共有多少棵树。这样我们就不用每次重新数了。"},{"html":"<h2>第三步：计算每个格子的账本</h2><p>计算 <span style='color:#9C27B0;'>pre[i][j]</span> 的公式：</p><div style='background:#E3F2FD; padding:12px; border-radius:8px; margin:10px 0;'><span style='color:#1565C0; font-weight:bold;'>pre[i][j] = 左边 + 上边 - 左上角 + 自己</span></div><div style='display:flex; gap:4px; margin:10px 0;'><span style='background:#BBDEFB; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>2</span><span style='background:#BBDEFB; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>3</span><span style='background:#64B5F6; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>?</span></div><p>比如：<span style='color:#E91E63;'>左边3棵树 + 上边2棵树 - 左上角1棵树 + 自己1棵树 = 5棵树</span></p>","narration":"第三步，我们来计算每个格子的账本。每个格子的数字等于左边格子的数字加上边格子的数字，再减去左上角格子的数字，最后加上自己有没有树。这样就能快速算出每个格子从左上角到这里的树的总数。"},{"html":"<h2>第四步：回答问题的魔法公式</h2><p>有了账本，回答一个矩形区域有多少棵树，只需要 <span style='color:#E91E63; font-weight:bold;'>一次计算</span>！</p><div style='background:#FFF3E0; padding:12px; border-radius:8px; margin:10px 0;'><span style='color:#E65100; font-weight:bold;'>答案 = 大矩形 - 上边 - 左边 + 左上角</span></div><div style='display:flex; gap:4px; margin:10px 0;'><span style='background:#FFCC80; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>A</span><span style='background:#FFE0B2; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>B</span><span style='background:#FFE0B2; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>C</span><span style='background:#FF9800; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>D</span></div><p>用四个角的前缀和数字，就能算出中间矩形里的树的数量。</p>","narration":"第四步，我们用一个神奇的公式来回答问题。要算一个长方形区域里的树，只需要用四个角的前缀和数字：大矩形的总数减去上面部分，再减去左边部分，最后加上多减掉的那个小角，就得到答案了。"},{"html":"<h2>第五步：完整示例</h2><p>看一个具体例子：森林大小 <span style='color:#2196F3; font-weight:bold;'>3×3</span></p><div style='display:grid; grid-template-columns:repeat(3,40px); gap:2px; margin:10px 0;'><span style='background:#4CAF50; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>⬜</span><span style='background:#4CAF50; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>⬜</span><span style='background:#4CAF50; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>⬜</span><span style='background:#4CAF50; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span><span style='background:#FFC107; width:40px; height:40px; display:flex; align-items:center; justify-content:center;'>⬜</span><span style='background:#4CAF50; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;'>🌲</span></div><p>问：从(1,1)到(2,2)的矩形里有多少树？<span style='color:#E91E63; font-weight:bold;'>用公式一算就知道有2棵树！</span></p>","narration":"第五步，我们来看一个完整的例子。一个3×3的森林，树和空地交错排列。如果有人问从左上角到中间这个长方形区域有多少棵树，我们用刚才的公式，只需要看四个角的前缀和数字，就能立刻算出答案。"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
