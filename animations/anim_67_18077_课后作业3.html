<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>18077-课后作业3</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">18077-课后作业3</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>18077-课后作业3</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：理解题意</h2><p>我们有一排<span style='color:#2196F3;font-weight:bold;'>历史温度</span>，比如：<span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>10</span><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>20</span><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>30</span><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>40</span><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>50</span>。现在要问一个<span style='color:#E91E63;font-weight:bold;'>新温度</span>，比如<span style='display:inline-block;background:#E91E63;color:white;padding:4px 8px;border-radius:4px;'>35</span>，找出历史温度中<span style='color:#4CAF50;font-weight:bold;'>最接近</span>它的那个。如果有两个一样接近，选<span style='color:#9C27B0;font-weight:bold;'>较小</span>的那个。</p>","narration":"第一步，理解题意。我们有一些历史温度，比如10、20、30、40、50。现在要问一个新温度，比如35，我们要从历史温度里找出最接近35的那个。30和40都离35是5度，一样接近，这时候我们要选较小的那个，也就是30。"},{"html":"<h2>第二步：先排序</h2><p>为了快速找到最接近的值，我们先把历史温度<span style='color:#2196F3;font-weight:bold;'>从小到大排好队</span>。<br><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>10</span> <span style='color:#999;'>→</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>20</span> <span style='color:#999;'>→</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>30</span> <span style='color:#999;'>→</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>40</span> <span style='color:#999;'>→</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>50</span></p>","narration":"第二步，先把历史温度从小到大排好队。这样我们就能用二分查找的方法，很快找到最接近的值。就像在字典里查字一样，先排好顺序。"},{"html":"<h2>第三步：特殊情况先处理</h2><p>如果新温度<span style='color:#E91E63;font-weight:bold;'>比最小的还小</span>，比如<span style='display:inline-block;background:#E91E63;color:white;padding:4px 8px;border-radius:4px;'>5</span>，那最接近的就是<span style='display:inline-block;background:#4CAF50;color:white;padding:4px 8px;border-radius:4px;'>10</span>。<br>如果新温度<span style='color:#E91E63;font-weight:bold;'>比最大的还大</span>，比如<span style='display:inline-block;background:#E91E63;color:white;padding:4px 8px;border-radius:4px;'>60</span>，那最接近的就是<span style='display:inline-block;background:#4CAF50;color:white;padding:4px 8px;border-radius:4px;'>50</span>。</p>","narration":"第三步，先处理两种特殊情况。如果新温度比最小的历史温度还小，那最小的就是最接近的。如果新温度比最大的还大，那最大的就是最接近的。这样就不用继续找了。"},{"html":"<h2>第四步：二分查找找位置</h2><p>用<span style='color:#2196F3;font-weight:bold;'>二分查找</span>找到第一个大于等于新温度的位置。<br>比如找35：<br><span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>10</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>20</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>30</span> <span style='display:inline-block;background:#4CAF50;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>40</span> <span style='display:inline-block;background:#FF9800;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>50</span><br>↑ 第一个大于等于35的是<span style='color:#4CAF50;font-weight:bold;'>40</span>，位置在<span style='color:#E91E63;'>第4个</span>。</p>","narration":"第四步，用二分查找找到第一个大于等于新温度的位置。比如找35，第一个大于等于35的是40，位置在第4个。二分查找就像猜数字游戏，每次从中间猜，很快就能找到。"},{"html":"<h2>第五步：比较两个邻居</h2><p>找到位置后，比较<span style='color:#4CAF50;font-weight:bold;'>这个数</span>和<span style='color:#2196F3;font-weight:bold;'>它前面的数</span>，看谁更接近。<br>比如35：<br><span style='display:inline-block;background:#2196F3;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>30</span> ← 差5度 <span style='color:#999;'>|</span> <span style='display:inline-block;background:#4CAF50;color:white;padding:4px 8px;margin:2px;border-radius:4px;'>40</span> ← 差5度<br>两个一样接近，选<span style='color:#9C27B0;font-weight:bold;'>较小的</span>：<span style='display:inline-block;background:#9C27B0;color:white;padding:4px 8px;border-radius:4px;'>30</span></p>","narration":"第五步，比较找到的这个数和它前面的那个数，看谁离新温度更近。比如35，30和40都差5度，一样接近，我们就选较小的那个，也就是30。这样我们就找到了最接近的温度。"},{"html":"<h2>第六步：总结</h2><p>整个过程就像<span style='color:#2196F3;font-weight:bold;'>排队找邻居</span>：<br>1️⃣ 先排好队（排序）<br>2️⃣ 看看是不是在队伍两头（特殊情况）<br>3️⃣ 用二分查找快速定位（找位置）<br>4️⃣ 比较两个邻居，选更近的（如果一样近选小的）<br>✅ 这样就能快速回答很多次询问啦！</p>","narration":"第六步，总结一下。我们先把历史温度排好队，然后看看新温度是不是在队伍的两头。如果不是，就用二分查找快速找到位置，再比较两个邻居，选更近的那个。如果一样近，就选小的。这样就能很快地回答很多次询问了！"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
