<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>17861-课后作业1</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">17861-课后作业1</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>17861-课后作业1</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：理解题目</h2><p>今天我们要玩一个“数字捉迷藏”游戏！</p><p>先输入一些数字（比如：<span style='color:#FF6B6B; font-weight:bold;'>5</span> <span style='color:#4ECDC4; font-weight:bold;'>2</span> <span style='color:#45B7D1; font-weight:bold;'>8</span> <span style='color:#96CEB4; font-weight:bold;'>1</span> <span style='color:#FFEAA7; font-weight:bold;'>9</span>），然后系统会把这些数字从小到大排好队。</p><p>接着，会问你好几个问题，比如“数字<span style='color:#FF6B6B; font-weight:bold;'>8</span>在队伍里吗？”你需要快速回答“<span style='color:#2ECC71; font-weight:bold;'>yes</span>”或者“<span style='color:#E74C3C; font-weight:bold;'>no</span>”。</p>","narration":"第一步，理解题目。我们要先输入一些数字，然后系统会帮它们从小到大排好队。接着，会问我们好几个问题，比如某个数字在不在队伍里，我们要快速回答“在”或者“不在”。"},{"html":"<h2>第二步：给数字排队</h2><p>把输入的数字从小到大排好队：</p><p><span style='display:inline-block; width:40px; height:40px; background:#96CEB4; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>1</span> <span style='display:inline-block; width:40px; height:40px; background:#45B7D1; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>2</span> <span style='display:inline-block; width:40px; height:40px; background:#FF6B6B; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>5</span> <span style='display:inline-block; width:40px; height:40px; background:#4ECDC4; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>8</span> <span style='display:inline-block; width:40px; height:40px; background:#FFEAA7; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>9</span></p><p>看！数字已经从小到大排好了，就像小朋友按身高站队一样。</p>","narration":"第二步，给数字排队。我们把所有输入的数字从小到大排好，就像小朋友按身高站队一样，最小的在最左边，最大的在最右边。"},{"html":"<h2>第三步：猜数字游戏开始</h2><p>现在，我们要找数字<span style='color:#FF6B6B; font-weight:bold;'>8</span>在不在队伍里。</p><p>先看中间的数字：<span style='display:inline-block; width:40px; height:40px; background:#FFD700; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>5</span>（黄色高亮）</p><p><span style='display:inline-block; width:40px; height:40px; background:#96CEB4; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>1</span> <span style='display:inline-block; width:40px; height:40px; background:#45B7D1; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>2</span> <span style='display:inline-block; width:40px; height:40px; background:#FFD700; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>5</span> <span style='display:inline-block; width:40px; height:40px; background:#4ECDC4; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>8</span> <span style='display:inline-block; width:40px; height:40px; background:#FFEAA7; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>9</span></p><p>因为<span style='color:#FF6B6B; font-weight:bold;'>8</span>比<span style='color:#FFD700; font-weight:bold;'>5</span>大，所以我们要到右边去找！</p>","narration":"第三步，开始猜数字。我们先看队伍中间的数字，比如要找8，中间是5，因为8比5大，所以8一定在右边那一半队伍里，左边就不用看了。"},{"html":"<h2>第四步：缩小范围</h2><p>现在只看右边的数字：<span style='display:inline-block; width:40px; height:40px; background:#4ECDC4; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>8</span> <span style='display:inline-block; width:40px; height:40px; background:#FFEAA7; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>9</span></p><p>再看中间的数字：<span style='display:inline-block; width:40px; height:40px; background:#FFD700; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>8</span>（黄色高亮）</p><p><span style='display:inline-block; width:40px; height:40px; background:#FFD700; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white; font-weight:bold;'>8</span> <span style='display:inline-block; width:40px; height:40px; background:#FFEAA7; text-align:center; line-height:40px; margin:2px; border-radius:5px; color:white;'>9</span></p><p>哇！中间的数字就是<span style='color:#FF6B6B; font-weight:bold;'>8</span>，找到了！所以答案是<span style='color:#2ECC71; font-weight:bold;'>yes</span>。</p>","narration":"第四步，缩小范围继续找。在右边两个数字里，再看中间的数字，正好是8，找到了！所以回答“yes”。如果找不到，就回答“no”。"},{"html":"<h2>第五步：总结方法</h2><p>这个方法叫做“<span style='color:#FF6B6B; font-weight:bold;'>二分查找</span>”，就像查字典一样：</p><p>1️⃣ 先看中间的数字</p><p>2️⃣ 如果比要找的数字大，就去左边找</p><p>3️⃣ 如果比要找的数字小，就去右边找</p><p>4️⃣ 一直重复，直到找到或者找完</p><p>这样每次都能<span style='color:#2ECC71; font-weight:bold;'>砍掉一半</span>的数字，非常快！</p>","narration":"第五步，总结方法。这个方法叫二分查找，就像查字典一样，每次看中间，然后决定去左边还是右边，每次都能排除一半的数字，所以找得特别快！"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
