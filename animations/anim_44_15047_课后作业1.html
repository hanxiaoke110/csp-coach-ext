<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>15047-课后作业1</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">15047-课后作业1</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>15047-课后作业1</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：理解题意</h2><p>今天我们要帮小精灵把一堆乱糟糟的字母卡片排好队！</p><div style='display:flex; gap:10px; flex-wrap:wrap; margin:15px 0;'> <span style='display:inline-block; width:40px; height:40px; background:#FFB3BA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>C</span> <span style='display:inline-block; width:40px; height:40px; background:#BAFFC9; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>A</span> <span style='display:inline-block; width:40px; height:40px; background:#BAE1FF; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>B</span> <span style='display:inline-block; width:40px; height:40px; background:#FFFFBA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>D</span> </div><p>我们有 <span style='color:#FF6B6B; font-weight:bold;'>n</span> 个字母（比如4个），它们现在顺序是乱的。我们要把它们按照字母表顺序（A→B→C→D…）排好，然后一个一个地报出来，中间用空格隔开。</p>","narration":"第一步，理解题意。我们有一些字母卡片，它们现在是乱序的。我们的任务就是帮它们按照字母表的顺序排好队，然后一个一个念出来，中间用空格隔开。"},{"html":"<h2>第二步：准备排队</h2><p>首先，我们要知道一共有多少张卡片。假设小精灵告诉我们有 <span style='color:#FF6B6B; font-weight:bold;'>4</span> 张卡片。</p><div style='display:flex; gap:10px; align-items:center; margin:15px 0;'> <span style='display:inline-block; width:40px; height:40px; background:#FFB3BA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>C</span> <span style='display:inline-block; width:40px; height:40px; background:#BAFFC9; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>A</span> <span style='display:inline-block; width:40px; height:40px; background:#BAE1FF; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>B</span> <span style='display:inline-block; width:40px; height:40px; background:#FFFFBA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>D</span> </div><p>然后我们把它们一个一个放进一个<span style='color:#845EC2; font-weight:bold;'>小篮子（数组）</span>里，按顺序放好：第一个是C，第二个是A，第三个是B，第四个是D。</p>","narration":"第二步，准备排队。我们先知道一共有几张卡片，然后把它们一个一个放进小篮子里，记住它们现在的位置。"},{"html":"<h2>第三步：开始排序</h2><p>现在我们要用<span style='color:#FF6B6B; font-weight:bold;'>魔法排序</span>，把卡片按字母表顺序排好！</p><div style='display:flex; gap:10px; flex-wrap:wrap; margin:15px 0;'> <span style='display:inline-block; width:40px; height:40px; background:#BAFFC9; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>A</span> <span style='display:inline-block; width:40px; height:40px; background:#BAE1FF; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>B</span> <span style='display:inline-block; width:40px; height:40px; background:#FFB3BA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>C</span> <span style='display:inline-block; width:40px; height:40px; background:#FFFFBA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>D</span> </div><p>看！魔法生效了！原来乱乱的 <span style='color:#FFB3BA;'>C A B D</span> 变成了整整齐齐的 <span style='color:#BAFFC9;'>A B C D</span>。最小的A跑到了最前面，最大的D跑到了最后面。</p>","narration":"第三步，开始排序。我们用魔法排序，把卡片按照字母表顺序重新排列。最小的字母跑到最前面，最大的字母跑到最后面，就像小朋友排队一样，矮的站前面，高的站后面。"},{"html":"<h2>第四步：报出结果</h2><p>排好队啦！现在我们要把结果念出来，每个字母之间用<span style='color:#FF6B6B; font-weight:bold;'>空格</span>隔开。</p><div style='display:flex; gap:10px; align-items:center; margin:15px 0;'> <span style='display:inline-block; width:40px; height:40px; background:#BAFFC9; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>A</span> <span style='font-size:24px; color:#999;'> </span> <span style='display:inline-block; width:40px; height:40px; background:#BAE1FF; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>B</span> <span style='font-size:24px; color:#999;'> </span> <span style='display:inline-block; width:40px; height:40px; background:#FFB3BA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>C</span> <span style='font-size:24px; color:#999;'> </span> <span style='display:inline-block; width:40px; height:40px; background:#FFFFBA; border-radius:8px; text-align:center; line-height:40px; font-size:20px; font-weight:bold; color:#333;'>D</span> </div><p>所以最终的结果就是：<span style='color:#845EC2; font-weight:bold; font-size:22px;'>A B C D</span></p>","narration":"第四步，报出结果。排好队之后，我们把字母一个一个念出来，每个字母之间用空格隔开，就像点名一样。这样大家就都听清楚啦！"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
