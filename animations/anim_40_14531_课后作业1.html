<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>14531-课后作业1</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">14531-课后作业1</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>14531-课后作业1</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：认识三进制和八进制</h2><p>我们平时用的数字是<span style='color:#2196F3; font-weight:bold;'>十进制</span>，有0-9共10个数字。</p><p>今天我们要认识两种新朋友：</p><p>🔵 <span style='color:#FF5722; font-weight:bold;'>三进制</span>：只用 <span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>0</span> <span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>1</span> <span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>2</span> 三个数字，逢3进1。</p><p>🟢 <span style='color:#4CAF50; font-weight:bold;'>八进制</span>：只用 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>0</span> 到 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>7</span> 八个数字，逢8进1。</p><p>我们的任务：把<span style='color:#FF5722; font-weight:bold;'>三进制数</span>变成<span style='color:#4CAF50; font-weight:bold;'>八进制数</span>！</p>","narration":"第一步，我们先认识两种新的数字系统。三进制只用0、1、2三个数字，八进制用0到7八个数字。我们的任务就是把一个三进制数变成八进制数。"},{"html":"<h2>第二步：三进制转十进制</h2><p>我们先把三进制数变成<span style='color:#2196F3; font-weight:bold;'>十进制</span>，因为十进制我们最熟悉！</p><p>方法：从左边开始，每次<span style='color:#FF9800; font-weight:bold;'>乘以3再加下一位</span>。</p><p>举个例子：三进制 <span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>2</span><span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>1</span><span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>0</span> 转十进制：</p><p>👉 先看第一位2：<span style='color:#FF9800;'>0×3+2=2</span></p><p>👉 再看第二位1：<span style='color:#FF9800;'>2×3+1=7</span></p><p>👉 再看第三位0：<span style='color:#FF9800;'>7×3+0=21</span></p><p>✅ 所以三进制210 = 十进制<span style='color:#2196F3; font-weight:bold;'>21</span></p>","narration":"第二步，我们把三进制数变成十进制。方法是从左到右，每次把当前结果乘以3，再加上下一位数字。比如三进制210，先算0乘3加2得2，再2乘3加1得7，再7乘3加0得21，所以三进制210就是十进制21。"},{"html":"<h2>第三步：十进制转八进制（除8取余法）</h2><p>现在我们有十进制数了，把它变成八进制！</p><p>方法：<span style='color:#4CAF50; font-weight:bold;'>不断除以8，记录余数</span>，最后倒着读余数。</p><p>用十进制<span style='color:#2196F3; font-weight:bold;'>21</span>做例子：</p><p>🔹 21 ÷ 8 = 2 余 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>5</span>  → 余数5</p><p>🔹 2 ÷ 8 = 0 余 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>2</span>  → 余数2</p><p>🔹 除到0为止，把余数<span style='color:#FF9800; font-weight:bold;'>倒着写</span>：<span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>2</span><span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>5</span></p><p>✅ 所以十进制21 = 八进制<span style='color:#4CAF50; font-weight:bold;'>25</span></p>","narration":"第三步，我们把十进制数变成八进制。用除8取余法，不断除以8，记录每次的余数，直到除到0为止。最后把余数倒着写出来，就是八进制数了。比如十进制21，除以8得2余5，2除以8得0余2，倒着写就是25。"},{"html":"<h2>第四步：特殊情况处理</h2><p>如果三进制数是<span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>0</span>，那十进制也是0，八进制也是<span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>0</span>。</p><p>因为0除以8还是0，余数也是0，直接输出0就可以啦！</p><p>🎯 其他情况就按我们学的方法一步步算。</p>","narration":"第四步，注意一个特殊情况。如果三进制数是0，那十进制和八进制都是0，直接输出0就可以了。其他情况就按我们刚才学的方法一步步计算。"},{"html":"<h2>第五步：完整示例</h2><p>把三进制 <span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>1</span><span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>2</span><span style='display:inline-block; background:#FF5722; color:white; padding:2px 8px; border-radius:4px;'>2</span> 转八进制：</p><p>第一步：三进制→十进制</p><p>👉 0×3+1=1 → 1×3+2=5 → 5×3+2=17</p><p>✅ 十进制 = <span style='color:#2196F3; font-weight:bold;'>17</span></p><p>第二步：十进制→八进制</p><p>🔹 17÷8=2 余 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>1</span></p><p>🔹 2÷8=0 余 <span style='display:inline-block; background:#4CAF50; color:white; padding:2px 8px; border-radius:4px;'>2</span></p><p>✅ 八进制 = <span style='display:inline-block; background:#4CAF50; color:white; padding:4px 12px; border-radius:4px; font-weight:bold;'>21</span></p><p>🎉 三进制122 = 八进制21！</p>","narration":"第五步，我们来看一个完整的例子。把三进制122变成八进制。先转十进制，从左到右，0乘3加1得1，1乘3加2得5，5乘3加2得17。再用除8取余法，17除以8得2余1，2除以8得0余2，倒着写就是21。所以三进制122等于八进制21。"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
