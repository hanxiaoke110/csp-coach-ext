<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>17862-课后作业4</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">17862-课后作业4</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>17862-课后作业4</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：理解题目</h2><p>我们要在一堆数字中，找到两个数字，让它们的和等于一个目标数。</p><div style='display:flex; gap:10px; align-items:center; margin-top:10px;'>数字堆：<span style='background:#FFD700; padding:5px 10px; border-radius:5px;'>3</span> <span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> <span style='background:#98FB98; padding:5px 10px; border-radius:5px;'>2</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span> <span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span></div><div style='margin-top:10px;'>目标数：<span style='background:#FF6347; color:white; padding:5px 15px; border-radius:10px;'>10</span></div><p style='margin-top:10px;'>比如：<span style='background:#98FB98; padding:5px 10px; border-radius:5px;'>2</span> + <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span> = <span style='background:#FF6347; color:white; padding:5px 10px; border-radius:5px;'>10</span> ✅</p>","narration":"今天我们要玩一个数字配对游戏。给你一堆数字，还有一个目标数，你要找到两个数字，它们加起来正好等于目标数。比如目标数是10，那2和8就是一对好朋友。"},{"html":"<h2>第二步：先给数字排队</h2><p>为了让找数字更快，我们先把所有数字从小到大排好队。</p><div style='display:flex; gap:10px; align-items:center; margin-top:10px;'>排队前：<span style='background:#FFD700; padding:5px 10px; border-radius:5px;'>3</span> <span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> <span style='background:#98FB98; padding:5px 10px; border-radius:5px;'>2</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span> <span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span></div><div style='margin-top:10px;'>⬇️ 排队后：</div><div style='display:flex; gap:10px; align-items:center; margin-top:5px;'><span style='background:#98FB98; padding:5px 10px; border-radius:5px;'>2</span> <span style='background:#FFD700; padding:5px 10px; border-radius:5px;'>3</span> <span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span> <span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span></div>","narration":"首先，我们要把数字从小到大排好队，就像小朋友按身高排队一样。这样我们找数字的时候就能用聪明的方法，不用一个一个瞎找。"},{"html":"<h2>第三步：尝试第一个数字</h2><p>从最小的数字开始，看看它需要和谁配对。</p><div style='display:flex; gap:10px; align-items:center; margin-top:10px;'><span style='background:#98FB98; padding:5px 10px; border-radius:5px; border:3px solid #FF6347;'>2</span> <span style='background:#FFD700; padding:5px 10px; border-radius:5px;'>3</span> <span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span> <span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span></div><div style='margin-top:10px;'>目标数10 - 2 = <span style='background:#FF6347; color:white; padding:5px 10px; border-radius:5px;'>8</span></div><p>我们需要在剩下的数字中找<span style='background:#FF6347; color:white; padding:5px 10px; border-radius:5px;'>8</span>！</p>","narration":"我们先拿最小的数字2，算一算它需要和谁配对。10减去2等于8，所以我们要在剩下的数字里找8。"},{"html":"<h2>第四步：二分查找找伙伴</h2><p>用二分法在剩下的数字中快速找8。</p><div style='display:flex; gap:10px; align-items:center; margin-top:10px;'>剩下的数字：<span style='background:#FFD700; padding:5px 10px; border-radius:5px;'>3</span> <span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span> <span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span></div><div style='margin-top:10px;'>🔍 先看中间：<span style='background:#DDA0DD; padding:5px 10px; border-radius:5px;'>5</span> → 5 < 8，去右边找</div><div>🔍 再看右边中间：<span style='background:#87CEEB; padding:5px 10px; border-radius:5px;'>7</span> → 7 < 8，继续右边</div><div>🔍 找到：<span style='background:#FFB6C1; padding:5px 10px; border-radius:5px; border:3px solid #00FF00;'>8</span> ✅ 找到啦！</div>","narration":"我们用二分查找法来找8。先看中间的数字5，比8小，所以8肯定在右边。再看右边的中间7，还是比8小，继续往右。最后找到8啦！二分查找就像猜数字游戏，每次都猜中间，很快就能找到。"},{"html":"<h2>第五步：找到答案！</h2><p>我们找到了两个数字，它们的和等于目标数！</p><div style='display:flex; gap:10px; align-items:center; justify-content:center; margin-top:20px;'><span style='background:#98FB98; padding:10px 20px; border-radius:10px; font-size:24px; border:3px solid #FF6347;'>2</span> <span style='font-size:30px;'>+</span> <span style='background:#FFB6C1; padding:10px 20px; border-radius:10px; font-size:24px; border:3px solid #00FF00;'>8</span> <span style='font-size:30px;'>=</span> <span style='background:#FF6347; color:white; padding:10px 20px; border-radius:10px; font-size:24px;'>10</span></div><div style='margin-top:20px; text-align:center;'>🎉 成功！输出：<span style='background:#98FB98; padding:5px 10px; border-radius:5px;'>2</span> <span style='background:#FFB6C1; padding:5px 10px; border-radius:5px;'>8</span></div>","narration":"太棒了！我们找到了2和8，它们加起来正好等于10。所以答案就是2和8。如果所有数字都试完了还没找到，那就输出'No'，表示没有这样的两个数字。"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
