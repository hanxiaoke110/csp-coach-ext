<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>10330-拓展练习1</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">10330-拓展练习1</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>10330-拓展练习1</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：认识我们的任务</h2><p>今天我们要处理一组数字，比如：<span style='display:inline-block; background:#FFD700; padding:5px 10px; margin:2px; border-radius:5px;'>5</span> <span style='display:inline-block; background:#87CEEB; padding:5px 10px; margin:2px; border-radius:5px;'>3</span> <span style='display:inline-block; background:#98FB98; padding:5px 10px; margin:2px; border-radius:5px;'>8</span> <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; margin:2px; border-radius:5px;'>2</span> <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; margin:2px; border-radius:5px;'>6</span></p><p>我们要做两件事：<br>1️⃣ 找出这些数字中最大的那个（比如这里的 <span style='color:red; font-weight:bold;'>8</span>）<br>2️⃣ 把除了最大的数字以外的所有数字加起来，并把这些数字列出来</p>","narration":"第一步，我们来认识一下今天的任务。这里有一排彩色数字，我们要先找出最大的那个，然后把它请出去，把剩下的数字加起来，再排成一排展示出来。"},{"html":"<h2>第二步：找出最大的数字</h2><p>我们一个一个看过去，记住当前看到的最大值：</p><p>🔹 看到 <span style='display:inline-block; background:#FFD700; padding:5px 10px; border-radius:5px;'>5</span> → 当前最大是 <span style='color:red; font-weight:bold;'>5</span><br>🔹 看到 <span style='display:inline-block; background:#87CEEB; padding:5px 10px; border-radius:5px;'>3</span> → 3比5小，最大还是 <span style='color:red; font-weight:bold;'>5</span><br>🔹 看到 <span style='display:inline-block; background:#98FB98; padding:5px 10px; border-radius:5px;'>8</span> → 8比5大！更新最大为 <span style='color:red; font-weight:bold; font-size:1.2em;'>8</span><br>🔹 看到 <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; border-radius:5px;'>2</span> → 2比8小，最大还是 <span style='color:red; font-weight:bold;'>8</span><br>🔹 看到 <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; border-radius:5px;'>6</span> → 6比8小，最大还是 <span style='color:red; font-weight:bold;'>8</span></p><p>✅ 最终找到的最大数字是：<span style='background:red; color:white; padding:5px 15px; border-radius:10px; font-weight:bold;'>8</span></p>","narration":"第二步，我们要找出最大的数字。就像玩找宝藏一样，我们一个一个看过去，记住当前看到的最大值。遇到更大的就更新，最后找到的那个就是最大的。"},{"html":"<h2>第三步：把最大的数字请出去</h2><p>现在我们已经知道最大的是 <span style='background:red; color:white; padding:3px 10px; border-radius:5px;'>8</span>，把它标记出来：</p><p><span style='display:inline-block; background:#FFD700; padding:5px 10px; margin:2px; border-radius:5px;'>5</span> <span style='display:inline-block; background:#87CEEB; padding:5px 10px; margin:2px; border-radius:5px;'>3</span> <span style='display:inline-block; background:red; color:white; padding:5px 10px; margin:2px; border-radius:5px; font-weight:bold;'>8</span> <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; margin:2px; border-radius:5px;'>2</span> <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; margin:2px; border-radius:5px;'>6</span></p><p>剩下的数字是：<span style='display:inline-block; background:#FFD700; padding:5px 10px; margin:2px; border-radius:5px;'>5</span> <span style='display:inline-block; background:#87CEEB; padding:5px 10px; margin:2px; border-radius:5px;'>3</span> <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; margin:2px; border-radius:5px;'>2</span> <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; margin:2px; border-radius:5px;'>6</span></p>","narration":"第三步，我们把最大的数字请出去。看，红色的8就是最大的，它被标记出来了。剩下的四个彩色数字就是我们要处理的。"},{"html":"<h2>第四步：把剩下的数字加起来</h2><p>我们来计算剩下的数字的总和：</p><p><span style='display:inline-block; background:#FFD700; padding:5px 10px; border-radius:5px;'>5</span> + <span style='display:inline-block; background:#87CEEB; padding:5px 10px; border-radius:5px;'>3</span> + <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; border-radius:5px;'>2</span> + <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; border-radius:5px;'>6</span></p><p>一步一步加：<br>5 + 3 = <span style='color:orange; font-weight:bold;'>8</span><br>8 + 2 = <span style='color:orange; font-weight:bold;'>10</span><br>10 + 6 = <span style='background:orange; color:white; padding:5px 15px; border-radius:10px; font-weight:bold;'>16</span></p><p>✅ 总和是：<span style='background:orange; color:white; padding:5px 15px; border-radius:10px; font-weight:bold; font-size:1.2em;'>16</span></p>","narration":"第四步，我们把剩下的数字加起来。5加3等于8，8加2等于10，10加6等于16。所以这些数字的总和是16。"},{"html":"<h2>第五步：展示最终结果</h2><p>我们完成了两件事：</p><p>📊 <strong>总和</strong>：<span style='background:orange; color:white; padding:5px 15px; border-radius:10px; font-weight:bold; font-size:1.2em;'>16</span></p><p>📋 <strong>剩下的数字</strong>：<span style='display:inline-block; background:#FFD700; padding:5px 10px; margin:2px; border-radius:5px;'>5</span> <span style='display:inline-block; background:#87CEEB; padding:5px 10px; margin:2px; border-radius:5px;'>3</span> <span style='display:inline-block; background:#FFB6C1; padding:5px 10px; margin:2px; border-radius:5px;'>2</span> <span style='display:inline-block; background:#DDA0DD; padding:5px 10px; margin:2px; border-radius:5px;'>6</span></p><p>🎉 任务完成！我们成功找到了最大的数字，把它请出去，然后把剩下的数字加起来并展示出来。</p>","narration":"第五步，展示最终结果。总和是16，剩下的数字是5、3、2、6。我们成功完成了今天的任务，把最大的数字请出去，然后处理了剩下的数字。"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
