<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>8464-拓展练习2</title>
<script src="../lib/gsap.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4ff,#fae8ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
h1{font-size:24px;color:#1e293b;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.stage{min-height:280px;background:linear-gradient(135deg,#f8fafc,#faf5ff);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:2px dashed #e2e8f0}
.step-content{width:100%;text-align:center}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.95)}
.btn-prev{background:#e2e8f0;color:#475569}
.btn-next{background:#6366f1;color:#fff}
.btn-play{background:#10b981;color:#fff}
.btn-reset{background:#f59e0b;color:#fff}
.btn-speak{background:#8b5cf6;color:#fff;font-size:18px;padding:14px 32px;animation:pulse 1.5s infinite}
.btn:disabled{opacity:.4;pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 0 16px rgba(139,92,246,0)}}
.indicator{font-size:14px;color:#64748b;font-weight:600}
.progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}
.var-box{display:inline-block;background:#ede9fe;color:#5b21b6;padding:10px 20px;border-radius:12px;font-size:22px;font-weight:700;margin:8px;animation:bounceIn .4s}
.var-name{font-size:12px;color:#7c3aed;display:block}
.result-box{display:inline-block;background:#d1fae5;color:#065f46;padding:14px 28px;border-radius:16px;font-size:26px;font-weight:700;margin:8px;animation:bounceIn .4s}
.io-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.io-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 28px;text-align:center;min-width:110px;animation:bounceIn .4s}
.io-label{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:4px}
.io-value{font-size:32px;font-weight:700;color:#1e293b}
.arrow{font-size:40px;color:#6366f1;animation:bounceIn .4s}
.block-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.block{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;animation:bounceIn .4s}
.block-blue{background:linear-gradient(135deg,#6366f1,#4f46e5)}.block-green{background:linear-gradient(135deg,#10b981,#059669)}.block-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}.block-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
.block-pink{background:linear-gradient(135deg,#ec4899,#db2777)}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px}
.overlay-icon{font-size:64px;margin-bottom:16px}
.overlay-text{font-size:16px;color:#64748b;margin-bottom:20px}
.speak-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;padding:2px 10px;border-radius:10px;margin-left:8px}
.code-block{background:#1e1e2e;color:#cdd6f4;padding:16px 20px;border-radius:12px;text-align:left;font-family:'SF Mono',Monaco,monospace;font-size:14px;line-height:1.8;overflow-x:auto;white-space:pre;margin:8px 0}
.code-block .kw{color:#cba6f7}.code-block .cm{color:#6c7086}.code-block .str{color:#a6e3a1}.code-block .num{color:#fab387}.code-block .fn{color:#89b4fa}
.blank{display:inline-block;background:#f9e076;color:#92400e;padding:1px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center}
</style>
</head>
<body>
<div class="overlay" id="overlay">
<div class="overlay-box">
<div class="overlay-icon">🎓</div>
<h2 style="margin-bottom:8px;color:#1e293b;">8464-拓展练习2</h2>
<div class="overlay-text">点击下方按钮开始学习<br>（同时启用语音讲解 🔊）</div>
<button class="btn btn-speak" id="startBtn">🔊 开始讲解</button>
</div>
</div>
<div class="card">
<h1>8464-拓展练习2</h1>
<div class="subtitle">共 <span id="totalSteps"></span> 步 <span class="speak-badge" id="speakBadge" style="display:none">🔊 语音已开启</span></div>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="stage"><div class="step-content" id="stage"></div></div>
<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>◀ 上一步</button>
  <span class="indicator" id="indicator">0 / 0</span>
  <button class="btn btn-next" id="nextBtn">下一步 ▶</button>
  <button class="btn btn-play" id="playBtn">▶ 自动播放</button>
  <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
</div>
</div>

<script type="application/json" id="steps-data" data-voice="auto">[{"html":"<h2>第一步：理解题意</h2><p>今天我们要找两个数字的<span style='color:#FF6B6B; font-weight:bold;'>最小公倍数</span>！比如数字<span style='color:#4ECDC4; font-weight:bold;'>4</span>和<span style='color:#45B7D1; font-weight:bold;'>6</span>，它们共同的倍数有12、24、36...其中<span style='color:#FFD93D; font-weight:bold;'>最小的那个</span>就是12。</p><div style='display:flex; gap:10px; margin-top:10px;'><div style='background:#4ECDC4; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;'>4</div><div style='background:#45B7D1; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;'>6</div><div style='background:#FFD93D; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;'>12</div></div>","narration":"第一步，理解题意。我们要输入两个数字，然后找出它们的最小公倍数。最小公倍数就是能同时被这两个数整除的最小的那个数。"},{"html":"<h2>第二步：发现规律</h2><p>我们可以用<span style='color:#FF6B6B; font-weight:bold;'>最大公约数</span>来帮忙！比如<span style='color:#4ECDC4; font-weight:bold;'>4</span>和<span style='color:#45B7D1; font-weight:bold;'>6</span>，它们的最大公约数是<span style='color:#FFD93D; font-weight:bold;'>2</span>。</p><div style='display:flex; gap:10px; margin-top:10px; align-items:center;'><div style='background:#4ECDC4; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>4</div><span style='font-size:20px;'>×</span><div style='background:#45B7D1; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>6</div><span style='font-size:20px;'>÷</span><div style='background:#FFD93D; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>2</div><span style='font-size:20px;'>=</span><div style='background:#96CEB4; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;'>12</div></div>","narration":"第二步，我们发现一个秘密！两个数相乘，再除以它们的最大公约数，结果就是最小公倍数。比如4×6÷2=12，12就是4和6的最小公倍数。"},{"html":"<h2>第三步：找最大公约数</h2><p>怎么找最大公约数呢？我们从<span style='color:#FF6B6B; font-weight:bold;'>较小的那个数</span>开始，一个一个往下试，看哪个数能同时整除两个数。</p><div style='display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;'><div style='background:#FF6B6B; width:35px; height:35px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>4</div><div style='background:#ccc; width:35px; height:35px; border-radius:5px; display:flex; align-items:center; justify-content:center;'>3</div><div style='background:#4ECDC4; width:35px; height:35px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>2✓</div><div style='background:#ccc; width:35px; height:35px; border-radius:5px; display:flex; align-items:center; justify-content:center;'>1</div></div><p style='margin-top:5px;'>从4开始试，4不能同时整除4和6，3也不行，<span style='color:#4ECDC4; font-weight:bold;'>2可以</span>！所以最大公约数是2。</p>","narration":"第三步，我们要找到最大公约数。从两个数中较小的那个开始，一直往下试到1，第一个能同时整除两个数的就是最大公约数。"},{"html":"<h2>第四步：计算最小公倍数</h2><p>找到最大公约数后，用公式：<span style='color:#FF6B6B; font-weight:bold;'>两数相乘 ÷ 最大公约数</span>。</p><div style='display:flex; gap:10px; margin-top:10px; align-items:center;'><div style='background:#4ECDC4; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>4</div><span style='font-size:20px;'>×</span><div style='background:#45B7D1; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>6</div><span style='font-size:20px;'>=</span><div style='background:#96CEB4; width:50px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>24</div><span style='font-size:20px;'>÷</span><div style='background:#FFD93D; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>2</div><span style='font-size:20px;'>=</span><div style='background:#FF6B6B; width:50px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;'>12</div></div>","narration":"第四步，用我们发现的公式来计算。把两个数相乘，再除以最大公约数，就得到了最小公倍数。4×6=24，24÷2=12，所以最小公倍数是12。"},{"html":"<h2>第五步：输出结果</h2><p>最后，我们把算出来的最小公倍数<span style='color:#FF6B6B; font-weight:bold;'>显示出来</span>！</p><div style='display:flex; gap:10px; margin-top:10px; align-items:center;'><div style='background:#4ECDC4; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>4</div><span style='font-size:20px;'>和</span><div style='background:#45B7D1; width:40px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white;'>6</div><span style='font-size:20px;'>的最小公倍数是</span><div style='background:#FF6B6B; width:50px; height:40px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:20px;'>12</div></div>","narration":"第五步，输出结果。把计算得到的最小公倍数显示出来，告诉用户答案。这样就完成了！"}]</script>
<script src="../animations/template.js"></script>
</body>
</html>
